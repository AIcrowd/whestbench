[project]
name = "circuit-estimation"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "plotext",
    "rich",
    "textual",
    "tqdm",
]

[project.scripts]
cestim = "circuit_estimation.cli:main"
circuit-estimation = "circuit_estimation.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.2.0",
    "pyright>=1.1.0",
    "ruff>=0.6.0",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/conftest.py" = ["E402"]

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "standard"
include = [
    "src",
    "tests",
    "main.py",
]
