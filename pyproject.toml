[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project]
name = "network-estimation"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "scipy",
    "plotext",
    "rich",
    "tqdm",
]

[project.scripts]
nestim = "network_estimation.cli:main"
network-estimation = "network_estimation.cli:main"

[dependency-groups]
dev = [
    "pytest>=8.2.0",
    "pyright>=1.1.0",
    "ruff>=0.6.0",
]
pytorch = ["torch>=2.0"]
numba = ["numba>=0.58"]
jax = ["jax[cpu]>=0.4"]
cython = ["cython>=3.0"]
all-backends = ["torch>=2.0", "numba>=0.58", "jax[cpu]>=0.4", "cython>=3.0"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/conftest.py" = ["E402"]

[tool.pyright]
pythonVersion = "3.10"
typeCheckingMode = "standard"
include = [
    "src",
    "tests",
    "main.py",
]
