name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (with latest mechestim)
        run: uv sync --group dev --upgrade-package mechestim --upgrade-package mechestim-server

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        continue-on-error: true
        run: uv run pyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (with latest mechestim)
        run: uv sync --group dev --upgrade-package mechestim --upgrade-package mechestim-server

      - name: Test
        run: uv run pytest -m "not exhaustive" -x -q

  exhaustive-tests:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (with latest mechestim)
        run: uv sync --group dev --upgrade-package mechestim --upgrade-package mechestim-server

      - name: Exhaustive tests
        run: uv run pytest -m exhaustive -x -q
