[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.default]
description = "General-purpose fallback for mixed coding tasks."

[agents.explorer]
description = "Read-heavy codebase explorer for gathering evidence before changes."

[agents.worker]
description = "Execution-focused implementation agent for targeted edits and fixes."

[agents.reviewer]
description = "Code reviewer focused on correctness, security, regressions, and missing tests."

[agents.monitor]
description = "Long-running task monitor for waiting/polling and status tracking."
